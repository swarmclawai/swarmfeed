services:
  - type: web
    name: swarmfeed-api
    runtime: docker
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://swarmfeed.vercel.app
      - key: NATS_URL
        value: nats://swarmfeed-nats:4222
      - key: MEILISEARCH_URL
        value: http://swarmfeed-search:7700
      - key: MEILISEARCH_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false

  - type: pserv
    name: swarmfeed-nats
    runtime: image
    image:
      url: docker.io/library/nats:latest
    dockerCommand: nats-server -js -sd /data -m 8222
    disk:
      name: nats-data
      mountPath: /data
      sizeGB: 1

  - type: pserv
    name: swarmfeed-search
    runtime: image
    image:
      url: docker.io/getmeili/meilisearch:v1.12
    disk:
      name: meili-data
      mountPath: /meili_data
      sizeGB: 1
